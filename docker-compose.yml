---
# BEAI — local development stack
# All image tags are pinned per D25 (design.md Version Catalog). Never use `latest`.
# Run: docker compose up -d
# Stop: docker compose down
# Full teardown (remove volumes): docker compose down -v

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 17 + pgVector
  # Image: pgvector/pgvector:pg17-alpine (D25)
  # The init.sql script creates both `beai` (dev) and `beai_test` (Pest) databases.
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17-alpine
    container_name: beai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-beai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-beai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - beai_network

  # ---------------------------------------------------------------------------
  # Redis 8
  # Image: redis:8.0-alpine (D25)
  # Used for: queue, cache, session, JWT denylist (C2+), Horizon (C2+).
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8.0-alpine
    container_name: beai_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - beai_network

  # ---------------------------------------------------------------------------
  # Mailpit — local mail catcher
  # Image: axllent/mailpit:v1.22 (D25)
  # SMTP: port 1025 | Web UI: port 8025
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:v1.22
    container_name: beai_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - beai_network

  # ---------------------------------------------------------------------------
  # App services — enabled once the Dockerfiles exist in each app directory.
  # Each app requires postgres + redis healthy before starting.
  # PHP-FPM api: served on port 9000 internally; expose via a web server in C2+.
  # frontend SSR: Nitro node-server on port 3000.
  # backoffice SPA: nginx static serve on port 3001 (mapped from container 80).
  #
  # NOTE: These services use env_file pointing at each app's .env file.
  # Copy each app's .env.example to .env and fill in the values before running.
  # ---------------------------------------------------------------------------

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: beai-api:local
    container_name: beai_api
    restart: unless-stopped
    env_file:
      - path: ./api/.env
        required: false
    environment:
      # Override DB/Redis to use compose service names (not localhost)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-beai}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    ports:
      - "${API_PORT:-8000}:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null && echo ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - beai_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: beai-frontend:local
    container_name: beai_frontend
    restart: unless-stopped
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      NUXT_PUBLIC_API_BASE: http://api:9000/api
      NUXT_PUBLIC_APP_ENV: local
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - beai_network

  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    image: beai-backoffice:local
    container_name: beai_backoffice
    restart: unless-stopped
    env_file:
      - path: ./backoffice/.env
        required: false
    environment:
      NUXT_PUBLIC_API_BASE: http://api:9000/api
    ports:
      - "${BACKOFFICE_PORT:-3001}:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/health 2>&1 | grep -q '200 OK' || wget -qO- http://localhost:80/health | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - beai_network

# ---------------------------------------------------------------------------
# Named volumes (data persists across `docker compose restart`)
# Use `docker compose down -v` to wipe volumes (destructive — resets databases).
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
# Internal network — all services communicate over `beai_network`.
# ---------------------------------------------------------------------------
networks:
  beai_network:
    driver: bridge
