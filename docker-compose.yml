# ---------------------------------------------------------------------------
# Named volumes (data persists across `docker compose restart`)
# Use `docker compose down -v` to wipe volumes (destructive — resets databases).
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
# Internal network — all services communicate over `beai_network`.
# ---------------------------------------------------------------------------
networks:
  beai_network:
    driver: bridge
