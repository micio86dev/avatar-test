name: CI — backoffice

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun 1.3
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier format-check
        run: bun run format:check

      - name: TypeScript type-check
        run: bun run typecheck

      - name: Client drift check
        run: bun run codegen:check

      - name: Vitest unit tests + coverage
        run: node node_modules/.bin/vitest run --coverage --coverage.thresholds.lines=85

      - name: Install Playwright browsers
        run: node node_modules/.bin/playwright install --with-deps chromium webkit

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Build SPA (nuxt generate)
        run: bun run generate

      - name: Playwright E2E — chromium (full suite)
        run: node node_modules/.bin/playwright test --project=chromium

      - name: Playwright E2E — webkit (full suite)
        run: node node_modules/.bin/playwright test --project=webkit

      - name: Playwright E2E — mobile SA-11 gate
        run: node node_modules/.bin/playwright test --project=mobile

      - name: Docker build
        run: docker build -t beai-backoffice:ci .
