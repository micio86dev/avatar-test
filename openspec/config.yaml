schema: spec-driven
project: avatar-test
initialized: 2026-07-14
persistence: hybrid
strict_tdd: true

context: |
  Project: BEAI — Business Evaluation AI (multi-tenant AI voice-interview assessment)
  Backend: Laravel 13 + PHP 8.5 + Eloquent + PostgreSQL 17 (pgvector) + Redis 8 (Horizon) — target dir: api/
  Frontend (candidate, SSR): Nuxt 4 (Vue 3) + @nuxtjs/i18n — target dir: frontend/
  Backoffice (admin, SPA ssr:false): Nuxt 4 (Vue 3) + @nuxtjs/i18n — target dir: backoffice/
  Package manager (both Nuxt apps): Bun (install/dev/build); Node runs the SSR runtime + Vitest/Playwright
  Auth: JWT (tymon/jwt-auth) — bearer access+refresh + Redis denylist; short-lived JWT magic-link; RBAC via spatie/laravel-permission (teams mode); NOT Sanctum. Built in C2.
  Queue: Redis 8 + Laravel Horizon (async scoring, webhooks)
  Deploy: Railway — Git Flow (main/develop + feature/release/hotfix branches)
  Domain: BARS soft-skill assessment; 5 roles; 18 standard competencies + MTG/LAT
  Multi-tenancy: shared DB, row-level scoping by organization_id
  Topology: wrapper superproject + 3 git submodules (api, frontend, backoffice); Astro demo in legacy-demo/ (reference — NOT the target architecture)

testing:
  strict_tdd: true
  coverage_target: 85
  coverage_high_integrity: 95  # scoring, tenant-scoping, candidate state machine
  runners:
    backend:
      framework: Pest
      command: "php artisan test --parallel"
      status: scaffolded  # C1 done — 16/16 tests green; 96.4% coverage
    frontend_unit:
      framework: Vitest + Vue Test Utils
      command: "bun run test:unit"
      status: scaffolded  # C1 done — Vitest 3.x; 100% authored coverage; 85% gate
    backoffice_unit:
      framework: Vitest + Vue Test Utils
      command: "bun run test:unit"
      status: scaffolded  # C1 done — same as frontend
    frontend_e2e:
      framework: Playwright
      command: "bun run test:e2e"
      status: scaffolded  # C1 done — 3 projects (chromium/webkit/mobile); full run needs dev server
    backoffice_e2e:
      framework: Playwright
      command: "bun run test:e2e"
      status: scaffolded  # C1 done — same as frontend
  coverage:
    backend:
      command: "php artisan test --coverage --min=85"
      status: scaffolded  # PCOV; 96.4% on api/; gate: 85%
    frontend:
      command: "bun run test:unit --coverage"
      status: scaffolded  # v8; 100% on authored files; gate: 85%
    backoffice:
      command: "bun run test:unit --coverage"
      status: scaffolded  # v8; 100% on authored files; gate: 85%
  note: >
    All test runners scaffolded in C1 (change: project-skeleton-ci).
    Pest + Vitest + Playwright wired. E2E full run requires a live dev server
    (runtime verify deferred); all CI workflows contain the required steps.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Reference domain constraints from CLAUDE.md and docs/app_description/
    - Note open product decisions that block the change (see CLAUDE.md)
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Cross-tenant isolation MUST be covered by dedicated test scenarios
  design:
    - Include sequence diagrams for complex flows (auth, scoring, webhooks)
    - Document architecture decisions with rationale
    - Multi-tenancy: every query scope must be explicit in the design
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - TDD tasks: RED task always precedes GREEN+REFACTOR tasks
  apply:
    - Follow existing code patterns
    - Dependency Resolution Policy — if a pinned dependency cannot be resolved/installed, STOP and report; never downgrade, replace, remove/loosen constraints, or swap libraries (see CLAUDE.md → Autonomous implementation guardrails; design.md D25/D37)
    tdd: true
    test_command: "php artisan test --parallel"  # to-be-wired-in-C1 (backend)
    frontend_test_command: "bun run test:unit"    # to-be-wired-in-C1 (frontend)
  verify:
    test_command: "php artisan test --parallel"   # to-be-wired-in-C1
    build_command: ""
    coverage_threshold: 85
  archive:
    - Warn before merging destructive deltas
    - Update openspec/specs/{domain}/spec.md after archive
